<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Responder cuestionario</title>
</head>
<body>

<nav style="margin-bottom:16px;">
    <a href="/">Inicio</a> |
    <a href="/questionnaires">Lista cuestionarios</a> |
    <a th:href="@{/submissions/{id}(id=${submission.id})}">Recargar</a>
</nav>
<hr>

<h1 th:text="${questionnaire.title}"></h1>

<div style="padding:10px; border:1px solid #ccc; margin-bottom:12px;">
    <p style="margin:0;">
        <b>Código del cuestionario:</b>
        <span id="codeValue" th:text="${questionnaire.accessCode}"></span>
        <button type="button"
                onclick="navigator.clipboard.writeText(document.getElementById('codeValue').innerText)">
            Copiar
        </button>
    </p>
    <p style="margin:0; margin-top:6px;">
        <b>Email:</b> <span th:text="${submission.respondentEmail}"></span>
        &nbsp;|&nbsp;
        <b>Estado:</b> <span th:text="${submission.status}"></span>
    </p>
</div>

<div th:if="${param.submitted}" style="color:green; margin-bottom:12px;">
    ✅ Enviado correctamente.
</div>

<div th:if="${error}" style="color:red; margin-bottom:12px;">
    <b>Error:</b> <span th:text="${error}"></span>
</div>

<form th:action="@{/submissions/{id}/save(id=${submission.id})}" method="post"
      th:if="${submission.status.name() == 'IN_PROGRESS'}">

    <div th:each="a : ${submission.answers}" style="margin-bottom:12px;">
        <div>
            <b th:text="${a.question.text}"></b>
            <span th:if="${a.question.required}" style="color:red;">*</span>
        </div>

        <div th:if="${a.question.type.name() == 'OPEN'}">
            <textarea th:name="${'answer_' + a.question.id}" rows="3" cols="80"
                      th:text="${a.textAnswer}"></textarea>
        </div>

        <div th:if="${a.question.type.name() == 'MULTIPLE_CHOICE'}">
            <input type="text" th:name="${'answer_' + a.question.id}"
                   th:value="${a.choiceAnswer}">
            <small>(por ahora, introduce una opción en texto)</small>
        </div>
    </div>

    <button type="submit">Guardar borrador</button>
</form>

<form th:action="@{/submissions/{id}/submit(id=${submission.id})}" method="post"
      th:if="${submission.status.name() == 'IN_PROGRESS'}" style="margin-top:10px;">
    <!-- resend same answers to submit -->
    <div th:each="a : ${submission.answers}">
        <input type="hidden" th:name="${'answer_' + a.question.id}"
               th:value="${a.question.type.name() == 'OPEN' ? a.textAnswer : a.choiceAnswer}">
    </div>
    <button type="submit">Enviar</button>
</form>

<div th:if="${submission.status.name() == 'SUBMITTED'}">
    <h3>Respuestas enviadas (solo lectura)</h3>
    <div th:each="a : ${submission.answers}" style="margin-bottom:12px;">
        <div><b th:text="${a.question.text}"></b></div>
        <div th:text="${a.question.type.name() == 'OPEN' ? a.textAnswer : a.choiceAnswer}"></div>
    </div>
</div>

</body>
</html>
